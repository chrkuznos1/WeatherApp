name: precommit-checks

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - master
      - '**/*'
  pull_request:

jobs:
  precommit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore packages
        run: dotnet restore

      - name: Verify formatting
        run: dotnet format WeatherApp.sln --verify-no-changes

      - name: Build with analyzers
#Runs static code analysis using built‑in .NET analyzers,Turns all warnings into errors,Enforces clean code,Catches unused variables, nullability issues, etc.     
        run: dotnet build WeatherApp.sln --no-restore -warnaserror

      - name: Check vulnerable packages
#for Security scanning,Detects NuGet packages with known CVEs,Fails the pipeline if vulnerabilities exist,Great for security hygiene     
        run: dotnet list WeatherApp.sln package --vulnerable

      - name: Run tests
        run: dotnet test WeatherApp.sln --no-restore


