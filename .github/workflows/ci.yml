#This runs on every push/PR.
#It does not push images and does not deploy.

name: CI - Build, Test, SBOM, Scan

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ master, br1-docker ]
  pull_request:

jobs:
# --- Parallel jobs: secrets + quality ---
# Previously a single 'precommit' job ran gitleaks then all dotnet steps
# sequentially. gitleaks only needs the repo checked out — it has zero
# dependency on dotnet. By splitting into two jobs GitHub runs them on
# separate runners simultaneously. Since gitleaks takes seconds and the
# dotnet chain takes minutes they finish at roughly the same time, and the
# ci (Docker) job starts as soon as BOTH pass. No wasted wait time.
# The ci job uses:  needs: [secrets, quality]


#The secrets job does a shallow clone (default fetch-depth: 1) ***
# — only the latest commit is downloaded. When gitleaks-action tries to
# scan the range between the previous push commit and the current one, the
# older commit doesn't exist locally and git fails.
# The fix: add fetch-depth: 0 to the checkout in the secrets job, 
# same as the quality job already has.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # *** required by gitleaks-action to scan commit range between pushes
      - name: Check for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

#if i want them on the same workflow  but not recommended
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required by SonarCloud for full blame/history analysis
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

# The precommit job runs dotnet restore on every run with no caching.
# Add this before the restore step to speed up CI significantly:
# - uses: actions/cache@v4
#   with:
#     path: ~/.nuget/packages
#     key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
#     restore-keys: ${{ runner.os }}-nuget-

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-
# Every run starts on a fresh runner with nothing pre-installed.
# dotnet restore downloads all NuGet packages from scratch on every run.
# With this cache step:
#   - First run: downloads packages normally, saves ~/.nuget/packages to
#     GitHub cache storage, keyed by a hash of all .csproj files.
#   - Subsequent runs: if no .csproj changed, packages are restored from
#     cache in seconds instead of 30-60s for a full download.
#   - If a .csproj changes (e.g. new package added), the hash changes,
#     cache misses, packages are downloaded fresh and cache is updated.
# No downside: if cache is stale or missing it falls back to normal restore.
      - run: dotnet restore
      - run: dotnet format WeatherApp.sln --verify-no-changes
      - run: dotnet build WeatherApp.sln --no-restore #-warnaserror  ...with this it turns all warnings into errors
      #This command only prints vulnerable packages — it exits with code 0
      # regardless. Your build won't stop even if critical CVEs are found.
      # Add --include-transitive for full coverage and consider using a 
      # dedicated action like dotnet-outdated or treating the output as 
      # advisory only (which is fine, just document it):
      # - run: dotnet list WeatherApp.sln package --vulnerable

      - run: dotnet list WeatherApp.sln package --vulnerable --include-transitive
      - run: dotnet test WeatherApp.sln --no-restore --collect:"XPlat Code Coverage"
# --collect adds coverage report which SonarCloud will pick up      

      - name: SonarCloud scan
        # Enterprise-grade static analysis  i have to test
        # Detects bugs, code smells, security hotspots, and tracks coverage
        
        # Using @master means you run whatever 
        # the maintainer pushes at any moment — a 
        #broken push or a compromised repo would 
        # immediately affect your pipeline. 
        # Pin to a specific version tag:
        # SonarSource/sonarcloud-github-action@v3
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # needed for PR decoration
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=chrkuznos
            -Dsonar.projectKey=chrkuznos1_WeatherApp
            -Dsonar.cs.opencover.reportsPaths=**/coverage.opencover.xml

      - name: Publish quality summary
        if: success()
        run: |
          echo "✅ Quality checks passed (format, build, tests, SonarCloud)." >> $GITHUB_STEP_SUMMARY


  # ci:
  #   needs: [secrets, quality]

  ci:
    needs: [secrets, quality]
    runs-on: ubuntu-latest
  
    permissions:
      contents: read #allows the workflow to read the repository contents.
#enables Cloning the repo, Reading files,Checking out code 
      id-token: write  # request an OIDC token from GitHub
#enables Keyless signing with Cosign,Federated authentication to cloud providers (Azure, AWS, GCP),Secure deployments without storing secrets
#Cosign uses OIDC to sign your Docker images without storing private keys
      packages: write #allows the workflow to push packages to GitHub Packages or GHCR (GitHub Container Registry)
#Your workflow builds and pushes a Docker image to GHCR.Without packages: write, the push would fail.      
      security-events: write #allows the workflow to upload security scan results to GitHub Security features
#Uploading SARIF reports,Integrating with CodeQL,Reporting vulnerabilities in the Security tab      
#needed because your pipeline includes trivy and SAST

    env:
          IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/weatherapp:${{ github.ref_name }}


    steps:
    - name: Checkout
      uses: actions/checkout@v4

# #2. Log in to Docker Hub
#     - name: Log in to Docker Hub
#       uses: docker/login-action@v4
#       with:
#         username: ${{ secrets.DOCKERHUB_USERNAME }}
#         password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker image (local only)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false  # DEN ANEVAZEI
        load: true        # <-- THIS IS THE FIX 
#could not determine source: errors occurred attempting to resolve 'weatherapp:ci':  
#docker/build-push-action@v5 uses Buildx, 
#and Buildx does not load the image into the local Docker engine unless you explicitly tell it to      
        tags: ${{ env.IMAGE_NAME }}
        # tags: weatherapp:ci  (old hardcoded tag — now using IMAGE_NAME env var)

    - name: Generate SBOM #Syft generates SBOM
      uses: anchore/sbom-action@v0.19.0 #anchore/syft-action@v0.14.0
      with:
        image: ${{ env.IMAGE_NAME }}
        output-file: sbom.json
        format: cyclonedx-json

  #Not necessary
    - name: Show SBOM
      run: cat sbom.json        

    - name: Upload SBOM artifact
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.json

    - name: Vulnerability Scan (Grype)  #like Trivy, Grype scans SBOM
      uses: anchore/scan-action@v7
      with:
        image: ${{ env.IMAGE_NAME }}
        fail-build: false #true
        #severity-cutoff: critical
######
#With fail-build: false:
#The scan runs
#Vulnerabilities are reported
#But the pipeline continues even if critical issues exist
#This is useful during early development or when you
#want visibility without blocking builds.

#  fail-build: true  

#Then any critical vulnerability will stop the pipeline.    
