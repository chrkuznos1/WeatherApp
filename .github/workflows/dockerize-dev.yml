name: Build and Push Docker Image

on:
  push:
    branches: 
     - br1-docker

# on:
#   push:
#     tags: 
#       - 'v*' # triggers on tags like v1.0.0, v2.1.3, etc.

#build → test → docker build → **SBOM generation** → push image → deploy


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout vcs repo
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image to docker hub
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/weatherapp:${{ github.ref_name }}

    # -------------------------------
    # 🔐 SBOM GENERATION (ADDED HERE)
    # -------------------------------
    - name: Generate SBOM for Docker image
      uses: anchore/sbom-action@v0.17.0 #anchore/syft-action@v0.14.0
      with:
        image: ${{ secrets.DOCKERHUB_USERNAME }}/weatherapp:${{ github.ref_name }}
        output-file: sbom.json
        format: cyclonedx-json

    - name: Show SBOM
      run: cat sbom.json

    - name: Upload SBOM artifact
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.json
    # -------------------------------

    - name: Vulnerability Scan (Grype)  #like Trivy, Grype scans SBOM
      uses: anchore/scan-action@v3
      with:
        image: ${{ secrets.DOCKERHUB_USERNAME }}/weatherapp:${{ github.ref_name }}
        fail-build: false


#
#
    - name: Log in to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}          