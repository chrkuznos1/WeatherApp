# Same pipeline as cd.yml but ALL secrets are fetched from AWS Secrets Manager
# at runtime instead of being stored in GitHub Environment Secrets.
#
# SECRETS APPROACH: AWS Secrets Manager via OIDC
#   WHY use AWS Secrets Manager instead of GitHub Secrets:
#   - Single source of truth: all secrets live in AWS, not duplicated in GitHub
#   - Automatic rotation: AWS can rotate SSH keys, tokens, etc. on a schedule
#   - Fine-grained IAM access: control exactly which pipelines can read which secrets
#   - Audit trail: every secret access is logged in AWS CloudTrail
#   - Works across tools: same secrets used by Jenkins, CircleCI, or other repos
#   See cd.yml for the simpler alternative using GitHub Environment Secrets.
#
# HOW IT WORKS:
#   1. GitHub Actions authenticates to AWS using OIDC (no static AWS keys stored).
#   2. AWS grants a temporary IAM role to this pipeline.
#   3. The pipeline fetches secrets from AWS Secrets Manager using that role.
#   4. Secrets are injected as env vars for the SSH deploy step.
#
# REQUIRED ONE-TIME AWS SETUP (do this before first run):
#   a) Create an OIDC identity provider in AWS IAM:
#      Provider URL : https://token.actions.githubusercontent.com
#      Audience     : sts.amazonaws.com
#   b) Create an IAM role (e.g. github-actions-weatherapp) with:
#      Trust policy : allow sts:AssumeRoleWithWebIdentity from the OIDC provider
#                     conditioned on repo and branch (see AWS docs)
#      Permissions  : secretsmanager:GetSecretValue on your secret ARNs
#   c) Store secrets in AWS Secrets Manager as JSON per environment, e.g.:
#      Secret name: /weatherapp/dev/deploy
#      Secret value (JSON):
#        {
#          "EC2_HOST":     "10.0.0.1",
#          "EC2_USER":     "ec2-user",
#          "EC2_SSH_KEY":  "-----BEGIN RSA PRIVATE KEY-----...",
#          "EC2_HOST_KEY": "ecdsa-sha2-nistp256 AAAA..."
#        }
#      Repeat for /weatherapp/sit/deploy, /weatherapp/uat/deploy,
#      /weatherapp/production/deploy
#      Also create: /weatherapp/shared/dockerhub
#        { "DOCKERHUB_USERNAME": "...", "DOCKERHUB_TOKEN": "..." }
#
# REQUIRED GITHUB SECRET (only one — at repo level):
#   AWS_ROLE_ARN   ARN of the IAM role created in step (b) above
#                  e.g. arn:aws:iam::123456789:role/github-actions-weatherapp
#
# HOW TO SET UP APPROVALS (same as cd.yml):
#   GitHub → repo Settings → Environments → select uat or production
#   → Required reviewers → add yourself or your team
#   → Deployment branches → restrict to master for production

name: CD - Deploy Environments (AWS Secrets Manager)

on:
  workflow_run:
    workflows: ["CI - Build, Test, SBOM, Scan"]
    types:
      - completed
    branches:
      - master
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # required for both Cosign OIDC signing AND AWS OIDC authentication
  contents: read

env:
  IMAGE_BASE: ${{ secrets.DOCKERHUB_USERNAME }}/weatherapp2
  AWS_REGION: eu-west-1   # change to your AWS region

jobs:
  # -----------------------------------------------------------------------
  # WHAT: Builds the Docker image, pushes to Docker Hub, signs with Cosign.
  #   Docker Hub credentials are fetched from AWS Secrets Manager here too,
  #   so no DOCKERHUB_* secrets need to be stored in GitHub at all.
  # WHY build once: all deploy jobs reuse this exact image via job outputs.
  # -----------------------------------------------------------------------
  build-and-push:
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'push')
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # WHY configure-aws-credentials first: all subsequent AWS API calls
      # (Secrets Manager, etc.) use the temporary credentials from this step.
      # OIDC means no AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY are stored anywhere.
      - name: Authenticate to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}  # only GitHub secret needed
          aws-region: ${{ env.AWS_REGION }}

      # WHY fetch Docker Hub creds from AWS: keeps all secrets in one place.
      # The secret /weatherapp/shared/dockerhub is a JSON object:
      #   { "DOCKERHUB_USERNAME": "...", "DOCKERHUB_TOKEN": "..." }
      - name: Fetch Docker Hub credentials from AWS Secrets Manager
        id: dockerhub-secrets
        uses: aws-actions/aws-secretsmanager-get-secret-value@v2
        with:
          secret-id: /weatherapp/shared/dockerhub

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          # fromJson parses the JSON secret string into an object
          username: ${{ fromJson(steps.dockerhub-secrets.outputs.SecretString).DOCKERHUB_USERNAME }}
          password: ${{ fromJson(steps.dockerhub-secrets.outputs.SecretString).DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push to Docker Hub
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker Hub image (OIDC keyless)
        run: |
          cosign sign --yes ${{ env.IMAGE_BASE }}@${{ steps.build.outputs.digest }}

      # Commented: push and sign to ACR in addition to Docker Hub
      # - name: Log in to ACR
      #   uses: azure/docker-login@v2
      #   with:
      #     login-server: ${{ secrets.ACR_LOGIN_SERVER }}
      #     use-azure-cli: false
      # - name: Push image to ACR
      #   run: |
      #     docker tag ${{ env.IMAGE_BASE }}:${{ steps.meta.outputs.version }} \
      #       ${{ secrets.ACR_LOGIN_SERVER }}/weatherapp:${{ steps.meta.outputs.version }}
      #     docker push ${{ secrets.ACR_LOGIN_SERVER }}/weatherapp:${{ steps.meta.outputs.version }}
      # - name: Sign ACR image
      #   run: |
      #     cosign sign --yes \
      #       ${{ secrets.ACR_LOGIN_SERVER }}/weatherapp@${{ steps.build.outputs.digest }}


  # -----------------------------------------------------------------------
  # WHAT: Sequential environment promotion chain via SSH to EC2 + Docker Compose.
  # WHY sequential: each env must pass before the next receives the image.
  #
  # HOW secrets flow in each deploy job:
  #   1. configure-aws-credentials → obtains temporary AWS credentials via OIDC
  #   2. aws-secretsmanager-get-secret-value → fetches the JSON secret for that env
  #   3. fromJson() → extracts individual values (host, user, key, etc.)
  #   4. appleboy/ssh-action → SSHes into EC2 using those values
  #
  # WHY no checkout in deploy jobs: these jobs only SSH into EC2 and run remote
  #   commands. The docker-compose.yml lives on the EC2 under /opt/weatherapp.
  # -----------------------------------------------------------------------

  deploy-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: dev    # no approval — auto-deploys on every master commit
    env:
      IMAGE: ${{ needs.build-and-push.outputs.image-tag }}
      # Path in AWS Secrets Manager for this environment's deploy secrets
      SECRET_PATH: /weatherapp/dev/deploy

    steps:
      - name: Authenticate to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Fetches: EC2_HOST, EC2_USER, EC2_SSH_KEY, EC2_HOST_KEY
      # from /weatherapp/dev/deploy in AWS Secrets Manager
      - name: Fetch dev deploy secrets from AWS Secrets Manager
        id: deploy-secrets
        uses: aws-actions/aws-secretsmanager-get-secret-value@v2
        with:
          secret-id: ${{ env.SECRET_PATH }}

      - name: Fetch Docker Hub credentials from AWS Secrets Manager
        id: dockerhub-secrets
        uses: aws-actions/aws-secretsmanager-get-secret-value@v2
        with:
          secret-id: /weatherapp/shared/dockerhub

      - name: Deploy to dev EC2 (Docker Compose)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ fromJson(steps.deploy-secrets.outputs.SecretString).EC2_HOST }}
          username: ${{ fromJson(steps.deploy-secrets.outputs.SecretString).EC2_USER }}
          key: ${{ fromJson(steps.deploy-secrets.outputs.SecretString).EC2_SSH_KEY }}
          fingerprint: ${{ fromJson(steps.deploy-secrets.outputs.SecretString).EC2_HOST_KEY }}
          envs: IMAGE,IMAGE_BASE,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker pull $IMAGE_BASE:$IMAGE
            cd /opt/weatherapp
            IMAGE_BASE=$IMAGE_BASE IMAGE=$IMAGE docker compose up -d --remove-orphans
            docker image prune -f
            docker compose ps
        env:
          IMAGE_BASE: ${{ env.IMAGE_BASE }}
          DOCKERHUB_USERNAME: ${{ fromJson(steps.dockerhub-secrets.outputs.SecretString).DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ fromJson(steps.dockerhub-secrets.outputs.SecretString).DOCKERHUB_TOKEN }}

  deploy-sit:
    needs: [build-and-push, deploy-dev]
    runs-on: ubuntu-latest
    environment: sit    # no approval — auto-deploys after dev passes
    env:
      IMAGE: ${{ needs.build-and-push.outputs.image-tag }}
      SECRET_PATH: /weatherapp/sit/deploy

    steps:
      - name: Authenticate to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch sit deploy secrets from AWS Secrets Manager
        id: deploy-secrets
        uses: aws-actions/aws-secretsmanager-get-secret-value@v2
        with:
          secret-id: ${{ env.SECRET_PATH }}

      - name: Fetch Docker Hub credentials from AWS Secrets Manager
        id: dockerhub-secrets
        uses: aws-actions/aws-secretsmanager-get-secret-value@v2
        with:
          secret-id: /weatherapp/shared/dockerhub

      - name: Deploy to sit EC2 (Docker Compose)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ fromJson(steps.deploy-secrets.outputs.SecretString).EC2_HOST }}
          username: ${{ fromJson(steps.deploy-secrets.outputs.SecretString).EC2_USER }}
          key: ${{ fromJson(steps.deploy-secrets.outputs.SecretString).EC2_SSH_KEY }}
          fingerprint: ${{ fromJson(steps.deploy-secrets.outputs.SecretString).EC2_HOST_KEY }}
          envs: IMAGE,IMAGE_BASE,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker pull $IMAGE_BASE:$IMAGE
            cd /opt/weatherapp
            IMAGE_BASE=$IMAGE_BASE IMAGE=$IMAGE docker compose up -d --remove-orphans
            docker image prune -f
            docker compose ps
        env:
          IMAGE_BASE: ${{ env.IMAGE_BASE }}
          DOCKERHUB_USERNAME: ${{ fromJson(steps.dockerhub-secrets.outputs.SecretString).DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ fromJson(steps.dockerhub-secrets.outputs.SecretString).DOCKERHUB_TOKEN }}

  deploy-uat:
    needs: [build-and-push, deploy-sit]
    runs-on: ubuntu-latest
    environment: uat    # MANUAL APPROVAL GATE — configure in GitHub Settings → Environments
    env:
      IMAGE: ${{ needs.build-and-push.outputs.image-tag }}
      SECRET_PATH: /weatherapp/uat/deploy

    steps:
      - name: Authenticate to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch uat deploy secrets from AWS Secrets Manager
        id: deploy-secrets
        uses: aws-actions/aws-secretsmanager-get-secret-value@v2
        with:
          secret-id: ${{ env.SECRET_PATH }}

      - name: Fetch Docker Hub credentials from AWS Secrets Manager
        id: dockerhub-secrets
        uses: aws-actions/aws-secretsmanager-get-secret-value@v2
        with:
          secret-id: /weatherapp/shared/dockerhub

      - name: Deploy to uat EC2 (Docker Compose)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ fromJson(steps.deploy-secrets.outputs.SecretString).EC2_HOST }}
          username: ${{ fromJson(steps.deploy-secrets.outputs.SecretString).EC2_USER }}
          key: ${{ fromJson(steps.deploy-secrets.outputs.SecretString).EC2_SSH_KEY }}
          fingerprint: ${{ fromJson(steps.deploy-secrets.outputs.SecretString).EC2_HOST_KEY }}
          envs: IMAGE,IMAGE_BASE,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker pull $IMAGE_BASE:$IMAGE
            cd /opt/weatherapp
            IMAGE_BASE=$IMAGE_BASE IMAGE=$IMAGE docker compose up -d --remove-orphans
            docker image prune -f
            docker compose ps
        env:
          IMAGE_BASE: ${{ env.IMAGE_BASE }}
          DOCKERHUB_USERNAME: ${{ fromJson(steps.dockerhub-secrets.outputs.SecretString).DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ fromJson(steps.dockerhub-secrets.outputs.SecretString).DOCKERHUB_TOKEN }}

  deploy-production:
    needs: [build-and-push, deploy-uat]
    runs-on: ubuntu-latest
    environment: production    # MANUAL APPROVAL GATE — configure in GitHub Settings → Environments
    # WHY restrict branch: production must only receive code from master.
    # Set Deployment branches → master only in GitHub Settings → Environments → production.
    env:
      IMAGE: ${{ needs.build-and-push.outputs.image-tag }}
      SECRET_PATH: /weatherapp/production/deploy

    steps:
      - name: Authenticate to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch production deploy secrets from AWS Secrets Manager
        id: deploy-secrets
        uses: aws-actions/aws-secretsmanager-get-secret-value@v2
        with:
          secret-id: ${{ env.SECRET_PATH }}

      - name: Fetch Docker Hub credentials from AWS Secrets Manager
        id: dockerhub-secrets
        uses: aws-actions/aws-secretsmanager-get-secret-value@v2
        with:
          secret-id: /weatherapp/shared/dockerhub

      - name: Deploy to production EC2 (Docker Compose)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ fromJson(steps.deploy-secrets.outputs.SecretString).EC2_HOST }}
          username: ${{ fromJson(steps.deploy-secrets.outputs.SecretString).EC2_USER }}
          key: ${{ fromJson(steps.deploy-secrets.outputs.SecretString).EC2_SSH_KEY }}
          fingerprint: ${{ fromJson(steps.deploy-secrets.outputs.SecretString).EC2_HOST_KEY }}
          envs: IMAGE,IMAGE_BASE,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker pull $IMAGE_BASE:$IMAGE
            cd /opt/weatherapp
            IMAGE_BASE=$IMAGE_BASE IMAGE=$IMAGE docker compose up -d --remove-orphans
            docker image prune -f
            docker compose ps
        env:
          IMAGE_BASE: ${{ env.IMAGE_BASE }}
          DOCKERHUB_USERNAME: ${{ fromJson(steps.dockerhub-secrets.outputs.SecretString).DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ fromJson(steps.dockerhub-secrets.outputs.SecretString).DOCKERHUB_TOKEN }}

      # WHY smoke test on production only: production is the highest risk
      # environment. A basic HTTP check confirms the app is responding after deploy.
      # Adjust the URL/port to match your actual production endpoint.
      - name: Fetch production host for smoke test
        id: prod-host
        run: |
          echo "host=${{ fromJson(steps.deploy-secrets.outputs.SecretString).EC2_HOST }}" >> $GITHUB_OUTPUT

      - name: Smoke test production endpoint
        run: |
          echo "Waiting for app to become ready..."
          sleep 10
          curl --fail --retry 3 --retry-delay 5 \
            http://${{ steps.prod-host.outputs.host }}:8080/health || \
            (echo "Smoke test failed — app did not respond after deploy" && exit 1)
